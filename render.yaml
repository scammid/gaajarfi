services:
  - type: web
    name: gaajarfi
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /health
    envVars:
      - key: REPLICATE_API_TOKEN
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0
